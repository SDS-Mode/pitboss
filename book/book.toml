[book]
title = "Pitboss"
authors = ["Pitboss contributors"]
description = "Dispatcher for running and observing parallel Claude Code sessions."
language = "en"
multilingual = false
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/SDS-Mode/pitboss"
edit-url-template = "https://github.com/SDS-Mode/pitboss/edit/main/book/{path}"
site-url = "/pitboss/"

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1
