# Build + publish the pitboss container image to GitHub Container Registry
# using a matrix + merge pipeline on native runners (no QEMU).
#
# Triggers:
#   push to main   -> `ghcr.io/sds-mode/pitboss:main` + `:latest`
#   push tag v*    -> `ghcr.io/sds-mode/pitboss:<version>` (e.g. 0.5.0, 0.5, 0)
#                     also updates `:latest` on tag push
#   pull_request   -> build-only (no push) so PR authors see build failures.
#
# Platforms: linux/amd64 (ubuntu-latest) + linux/arm64 (ubuntu-24.04-arm).
# The arm64 cell runs natively on GitHub's free arm64 hosted runner.
#
# Architecture:
#   Job `build` (matrix of {platform, runner}): builds + pushes by digest,
#     uploads digest as artifact.
#   Job `merge` (single job, push events only): downloads digests, creates
#     multi-arch manifest via `docker buildx imagetools create`.

name: Container

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'book/**'
      - 'docs/**'
      - 'examples/**'
      - 'pitboss.example.toml'
      - 'LICENSE-*'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/container.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**'

permissions:
  contents: read
  packages: write

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  CLAUDE_CODE_VERSION: "2.1.114"

jobs:
  build:
    name: Build (${{ matrix.platform_pair }})
    runs-on: ${{ matrix.runner }}
    # Skip arm64 cells on PRs for turnaround.
    if: github.event_name == 'push' || matrix.platform == 'linux/amd64'
    strategy:
      fail-fast: false
      matrix:
        include:
          # On PR: amd64-only cells for both targets (skip arm64 for
          # PR turnaround; Dockerfile regressions in the with-claude
          # stage still surface via the amd64 cell).
          # On push: all 4 cells. The `if:` at job level filters arm64
          # on PR events.
          - target: runtime
            platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
            image: pitboss
          - target: runtime
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
            image: pitboss
          - target: with-claude
            platform: linux/amd64
            runner: ubuntu-latest
            platform_pair: linux-amd64
            image: pitboss-with-claude
          - target: with-claude
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_pair: linux-arm64
            image: pitboss-with-claude

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name (lowercase for GHCR)
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [[ "${{ matrix.target }}" == "with-claude" ]]; then
            echo "name=${{ env.REGISTRY }}/${REPO_LC}-with-claude" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (for labels only at this stage)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=build-${{ matrix.platform_pair }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform_pair }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.target }}-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge ${{ matrix.image }} manifest
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: runtime
            image: pitboss
            image_env: IMAGE_RUNTIME
          - target: with-claude
            image: pitboss-with-claude
            image_env: IMAGE_WITH_CLAUDE
    steps:
      - name: Resolve image name (lowercase for GHCR)
        id: image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [[ "${{ matrix.target }}" == "with-claude" ]]; then
            echo "name=${{ env.REGISTRY }}/${REPO_LC}-with-claude" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ env.REGISTRY }}/${REPO_LC}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download digest artifacts (this target only)
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (final tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image.outputs.name }}@sha256:%s ' *)

      - name: Inspect final manifest
        run: |
          docker buildx imagetools inspect \
            ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}

  smoke-test:
    name: Smoke test ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: [merge]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Strip leading `v` to match the semver {{version}} tag.
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            echo "value=main" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke-test with-claude image
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LC}-with-claude:${{ steps.tag.outputs.value }}"
          echo "Testing $IMAGE"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" claude --version
          docker run --rm "$IMAGE" pitboss --version
          docker run --rm --entrypoint cat "$IMAGE" /usr/share/doc/claude-code/ATTRIBUTION
