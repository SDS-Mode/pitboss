<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Pitboss</title>
    <script>
      // Avoid theme flash: read persisted preference before hydration.
      try {
        const m = localStorage.getItem('mode-watcher-mode');
        const dark =
          m === 'dark' ||
          (m !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground h-full">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
