# git-cliff config — generates the CHANGELOG from conventional commits.
#
# Usage at release time:
#   git cliff --tag v0.9.2 -o CHANGELOG.md
#
# Usage to preview unreleased section without writing:
#   git cliff --unreleased
#
# See #242 for adoption rationale. Source format is "type(scope): subject"
# enforced (informally) by reviewers; cliff parses these into Keep-a-Changelog
# sections. Trailing "(#NNN)" PR-number suffixes are stripped automatically.

[changelog]
# Header preserved across regenerations — cliff replaces from `## [Unreleased]`
# downward, so anything above this line survives.
header = """
# Changelog

All notable changes to Pitboss are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).
This project uses [Semantic Versioning](https://semver.org/).

CHANGELOG entries from v0.9.2 onward are generated from commit messages
by `git-cliff` at release time. Hand-editing this file in feature PRs
is no longer required (or recommended — it causes merge conflicts).
See #242 for the adoption notes.

"""

# Template for each release section. {{ version }} is None for unreleased
# work, in which case we emit `## [Unreleased]` instead of a tagged
# heading.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits %}\
- {{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/SDS-Mode/pitboss/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}
{% endfor %}\n
"""

# trim leading/trailing whitespace from each rendered template
trim = true

footer = """
<!-- generated by git-cliff -->
"""

# Render breaking changes in their own dedicated section ahead of the others.
postprocessors = []

[git]
# Conventional Commits parser — recognizes "feat:", "fix(scope):", etc.
conventional_commits = true
# Don't include commits that don't match a conventional prefix. Set false
# during initial migration; flip to true once contributors are in the habit.
filter_unconventional = false
# Pre-process commit messages before the conventional parser runs. cliff
# applies these to the FIRST line of the commit (the subject) — multi-line
# bodies are not affected here. Use `(?m)` if you need multi-line.
commit_preprocessors = [
    # Strip trailing PR-number suffixes — cliff appends a clean PR link via
    # `commit.remote.pr_number`, so the legacy "(#NNN)" / "(#NNN) (#MMM)"
    # noise in the subject is redundant.
    { pattern = '(?m) \(#\d+\)( \(#\d+\))*$', replace = "" },
    # Fix Dependabot's double-scope (`chore(deps)(deps): bump …`).
    { pattern = '^chore\(deps\)\(deps\)', replace = "chore(deps)" },
]
# Map commit type → CHANGELOG section. Order matters — first match wins.
# The wider community uses "Added/Fixed/Changed" from Keep-a-Changelog;
# we keep that vocabulary so existing entries don't look out of place.
commit_parsers = [
    # Breaking changes (cliff sets `commit.breaking = true` when the
    # subject has `!:` or the body has `BREAKING CHANGE:`). Promote
    # those to a dedicated section regardless of type.
    { breaking = true, group = "Breaking changes" },

    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^refactor", group = "Changed" },
    { message = "^perf", group = "Changed" },

    # Dependabot bumps are real changes operators care about — surface but
    # in their own section so they don't drown out feature work.
    { message = "^chore\\(deps\\)", group = "Dependencies" },

    # Everything else is build/test/CI/internal — exclude from CHANGELOG.
    { message = "^docs", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^style", skip = true },
    { message = "^release", skip = true },
]
# Drop commits that match no parser (default behavior for unconventional).
filter_commits = false
# Match git tags shaped like "v0.9.1" / "v1.0.0-rc.1" — treat each as a release.
tag_pattern = "v[0-9].*"
ignore_tags = ""
# Preserve tag order; don't try to re-sort across branches.
topo_order = false
sort_commits = "newest"

[remote.github]
# Surfaced when running locally so cliff can decorate commit lines with
# clickable PR links. Owner/repo are read from `git remote get-url origin`
# at runtime; explicit values here are only needed if the remote isn't
# named `origin` or for forks.
owner = "SDS-Mode"
repo = "pitboss"
