# R2 — Real-claude smoke: root lead adapts after worker is killed-with-reason
#
# This manifest is driven by a real claude-haiku-4-5 model session.
# It proves that:
#   1. The root lead (real claude) can spawn a worker via spawn_worker
#   2. When that worker is killed with a corrective reason, the synthetic
#      [SYSTEM] reprompt is triggered and logged on the lead's layer
#   3. The kill-with-reason mechanism works end-to-end through the MCP bridge
#
# NOTE: This manifest is designed for R2 which requires a side-channel
# operator to cancel a worker mid-flight with a reason. The manifest
# itself sets up a lead that spawns a worker and waits — the test drives
# the cancel_worker call externally via the MCP socket.
#
# Cost: ~$0.10-$0.20 per run (haiku, two tool-call round-trips)
# Prerequisites: ANTHROPIC_API_KEY set, `claude` in PATH

[run]
max_parallel_tasks = 2

[lead]
id = "R2-real-kill-with-reason"
directory = "."
prompt = """
You are running a small data-extraction pipeline. You will spawn ONE worker to extract values from a small dataset. The worker should produce its output in JSON format.

If the worker is killed and you receive feedback about format preferences, adapt and respawn with the requested format.

Use spawn_worker with prompt='extract values from sample input', model='claude-haiku-4-5', estimated_cost_usd=0.05. Then call wait_actor on its task_id.
"""
model = "claude-haiku-4-5"
budget_usd = 1.00
max_workers = 3
lead_timeout_secs = 180
