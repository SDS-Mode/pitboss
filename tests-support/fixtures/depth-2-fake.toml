# Depth-2 sub-lead manifest for fake-claude e2e tests.
# Used by crates/pitboss-cli/tests/e2e_sublead_flows.rs.

[run]
max_parallel = 4
max_workers = 4
budget_usd = 10.0

[lead]
prompt = "execute phase 1"
model = "claude-haiku-4-5"
budget_usd = 10.0
max_workers = 4
allow_subleads = true
max_subleads = 4
max_sublead_budget_usd = 5.0
max_workers_across_tree = 8
# use_worktree = false so the smoke test dispatch works without a git clone.
# The fake-claude binary exits cleanly regardless of directory.
use_worktree = false

[lead.sublead_defaults]
budget_usd = 1.0
max_workers = 2
lead_timeout_secs = 600
